<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Parking</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="overlay" id="main-menu">
        <div class="panel">
          <h1>Cursor Parking</h1>
          <p class="subtitle">Domine a arte de estacionar com precisão.</p>
          <button id="btn-play" class="primary">Jogar</button>
          <button id="btn-howto" class="secondary">Como jogar</button>
        </div>
      </div>

      <div class="overlay hidden" id="howto-menu">
        <div class="panel">
          <h2>Como jogar</h2>
          <ul class="howto-list">
            <li>Setas ou WASD para controlar o carro.</li>
            <li>Não bata em paredes ou cones.</li>
            <li>Estacione totalmente dentro da vaga antes do tempo acabar.</li>
          </ul>
          <button id="btn-back-main" class="secondary">Voltar</button>
        </div>
      </div>

      <div class="overlay hidden" id="pause-menu">
        <div class="panel small">
          <h2>Pausado</h2>
          <button id="btn-resume" class="primary">Retomar</button>
          <button id="btn-exit" class="secondary">Sair para menu</button>
        </div>
      </div>

      <div class="overlay hidden" id="level-complete">
        <div class="panel small">
          <h2>Estacionado!</h2>
          <p id="stats-text"></p>
          <button id="btn-next" class="primary">Próximo nível</button>
          <button id="btn-retry" class="secondary">Repetir nível</button>
        </div>
      </div>

      <div class="overlay hidden" id="game-over">
        <div class="panel small">
          <h2>Game Over</h2>
          <p id="game-over-text"></p>
          <button id="btn-retry-game" class="primary">Tentar novamente</button>
          <button id="btn-exit-gameover" class="secondary">Sair para menu</button>
        </div>
      </div>

      <header id="hud" class="hidden">
        <div class="hud-left">
          <span class="badge" id="hud-level">Nível 1</span>
          <span class="badge" id="hud-attempts">Tentativas: 0</span>
        </div>
        <div class="hud-right">
          <span class="badge" id="hud-time">Tempo: 0.0s</span>
          <button id="btn-pause" class="icon-button" title="Pausar">&#10074;&#10074;</button>
        </div>
      </header>

      <main>
        <canvas id="game-canvas" width="960" height="540"></canvas>
      </main>
    </div>

    <script src="game.js"></script>
  </body>
</html>
